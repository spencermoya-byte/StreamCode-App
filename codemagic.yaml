# StreamCode — iOS build on Codemagic (Expo, prebuilt on the server)
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-react-native-app/
workflows:
  streamcode-ios:
    name: StreamCode iOS
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: StreamCodeASC   # <-- name of the App Store Connect API key you add in Codemagic (Teams > Integrations)
    environment:
      ios_signing:
        distribution_type: app_store      # use ad_hoc if you only want direct device installs
        bundle_identifier: com.streamcode.app
      vars:
        XCODE_WORKSPACE: "StreamCode.xcworkspace"   # generated by `expo prebuild`; confirm with `ls ios/*.xcworkspace`
        XCODE_SCHEME: "StreamCode"
        APP_ID: 0000000000               # <-- your app's Apple ID number (App Store Connect > App > General > App Information)
      node: v22.13.1
      xcode: latest                       # must be Xcode 26+ for App Store/TestFlight as of Apr 28 2026
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Generate iOS project (Expo prebuild)
        script: npx expo prebuild --platform ios
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing
        script: xcode-project use-profiles --warn-only
      - name: Increment build number
        script: |
          cd $CM_BUILD_DIR/ios
          LATEST_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_ID")
          agvtool new-version -all $(($LATEST_BUILD_NUMBER + 1))
      - name: Build ipa
        script: |
          xcode-project build-ipa \
            --workspace "$CM_BUILD_DIR/ios/$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - StreamCode Family          # <-- create this internal tester group in App Store Connect
