# StreamCode — iOS DEVELOPMENT build on Codemagic (Expo dev client + hot reload)
# Builds a Debug dev-client .ipa. Install it once, then run `npx expo start`
# on your computer and it hot-reloads over the network — no rebuild needed
# unless you change native code/dependencies.
# Docs: https://docs.codemagic.io/yaml-quick-start/building-a-react-native-app/
workflows:
  streamcode-ios-dev:
    name: StreamCode iOS (dev client)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: StreamCodeASC   # <-- EXACT name of your App Store Connect API key in Codemagic
                                         #     (Teams > Integrations). Reuse PiLink's key name here.
    environment:
      ios_signing:
        distribution_type: development   # dev profile: installs on your registered device, debug build for hot reload
        bundle_identifier: com.streamcode.app
      node: v22.13.1
      xcode: latest                      # Xcode 26+ image
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: npm install
      - name: Expo prebuild (generate native iOS project)
        script: npx expo prebuild --platform ios --clean
      - name: Install CocoaPods
        script: cd ios && pod install
      - name: Set up code signing
        script: xcode-project use-profiles --warn-only
      - name: Build dev-client ipa (Debug)
        script: |
          set -e
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building scheme '$SCHEME' (Debug) from $WORKSPACE"
          xcode-project build-ipa \
            --workspace "$WORKSPACE" \
            --scheme "$SCHEME" \
            --config Debug
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - smgunner14@gmail.com         # <-- build status + .ipa install link is sent here
        notify:
          success: true
          failure: true
